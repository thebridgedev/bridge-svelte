# COMPOSE_PROJECT_NAME defaults to 'bridge' (slot 0). Worktree slots set this
# to 'bridge-wt-<N>' via a .env file in this directory (auto-loaded by
# docker compose) so the container name + host port don't collide with slot 0.
name: ${COMPOSE_PROJECT_NAME:-bridge}

services:
  bridge-svelte:
    container_name: ${COMPOSE_PROJECT_NAME:-bridge}-svelte
    image: bridge-svelte:dev
    build:
      target: dev
      context: ./
      dockerfile: ./Dockerfile
    volumes:
      - ./:/home/bridgeuser/app
      # Anonymous volume shadows the host's macOS node_modules so the container uses its own Linux build
      - /home/bridgeuser/app/node_modules
      - ../auth-core:/home/bridgeuser/auth-core
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "${BRIDGE_SVELTE_EXT_PORT:-3008}:3001"
    networks:
      - bridge

networks:
  bridge:
    driver: bridge
